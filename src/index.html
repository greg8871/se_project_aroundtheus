<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Explore US from Jacques Cousteau" />
    <meta name="author" content="Greg Cunningham" />
    <meta name="keywords" content="explore,travel,USA," />
    <title>Around the U.S.</title>
    
  </head>

  <body class="body">
    <div class="page">
      <header class="header">
        <a class="header__link">
          <img
            src="<%=require('./images/Logo.svg')%>"
            class="header__logo"
            alt="Around the U.S. Logo"
          />
        </a>
      </header>
      <main>
        <section class="profile">
         
            <div class="profile__image-container" >

              <img
              src="<%=require('./images/jacques-cousteau2.jpg')%>"
              class="profile__image"
              alt="profile image of JacquesCousteau"
              />
              <button
              class="profile__avatar-button"
              id="avatar-button"
              type="button"></button>
            </div>
          <div class="profile__content">
            <div class="profile__name">
              <h1 class="profile__name-title">Jacques Cousteau</h1>
               <button class="profile__edit-button" type="button"></button> 
            </div>
            <p class="profile__description">Explorer</p>
          </div>
           <button
            class="profile__add-button"
            id="add-button"
            type="button"
          ></button> 
        </section>

        <section class="locations">
          <ul class="locations__cards"></ul>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__copyright">© 2022 Around The U.S.</p>
      </footer>
      <div class="popup" id="edit-popup">
        <div class="popup__content">
          <button class="popup__close" type="button"></button> 
          <h3 class="popup__title">Edit-profile</h3>
          <form class="popup__form" id="edit-profile-form">
            <input
              class="popup__input popup__input_type_name"
              id="owner-name"
              name="title"
              placeholder="Name"
              type="text"
              minlength="2"
              maxlenght="40"
              required
            />
            <span class="popup__error" id="owner-name-error"></span>
            <input
              class="popup__input popup__input_type_description"
              id="owner-description"
              name="description"
              placeholder="Description"
              type="text"
              minlength="2"
              maxlenght="200"
              required
            />
            <span class="popup__error" id="owner-description-error"></span>
            <button class="popup__submit-button" type="submit">Save</button>
          </form>
          <!-- <button
          class="popup__close-button"
          type="button">close</button> -->
         </div>
      </div>
      <div class="popup" id="add-popup">
        <div class="popup__content">
          <button class="popup__close" type="button"></button>
          <h3 class="popup__title">New Place</h3>
          <form class="popup__form" id="add-card-form">
            <input
              class="popup__input popup__input_type_name"
              name="title"
              id="owner-title"
              placeholder="Title"
              type="text"
              minlength="1"
              maxlenght="30"
              required
            />
            <span class="popup__error" id="owner-title-error"></span>
            <input
              id="owner-url"
              class="popup__input popup__input_type_description"
              name="link"
              placeholder="Image Link"
              minlength="1"
              type="url"
              required
            />
           
            <span class="popup__error" id="owner-url-error"></span>
            <button class="popup__submit-button " type="submit" disabled>
              Save
            </button>
          </form>
          <button
          class="popup__close"
          type="button"></button>
        </div>
      </div>
      <div class="popup" id="preview__popup">
        <div class="popup__content popup__content_type_image">
          <button class="popup__close" type="button"></button>
          <img src="#" alt="#" class="popup__image" />
          <p class="popup__preview-caption"></p>
        </div>
      </div>
      <div class="popup" id="confirm-popup">
        <div class="popup__content popup__content_confirm">
          <form class="popup__form">
            <h3 class="popup__title popup__title_confirm">Are you sure?</h3>
            <button class="popup__submit-button" type="submit" >"yes"</button>
          </form>
          <button
          class="popup__close"
          type="button"></button>
      </div>
    </div>

    <div class="popup" id="avatar-popup">
      <div class="popup__content">
        <form class="popup__form" id="avatar-form" novalidate>
          <h3 class="popup__title">Change profile picture</h3>
          <input
            name="avatar"
            placeholder="Image Link"
            id="avatar-link"
            type="url"
            class="popup__input popup__input_type_avatar"
            required
          />
          <span
            class="popup__error popup__error_visible"
            id="avatar-link-error"
          ></span>
          <button class="popup__submit-button" type="submit" >"Save"</button>
            
          
        </form>
        <button
          class="popup__close"
          type="button"></button>
      </div>
    </div>

      <template id="card-template">
        <div class="card">
          <img class="card__image" src="#" alt="#" />
          <div class="card__footer">
            <h2 class="card__title"></h2>
            <div class="cards__likes">
            <button type="button" class="card__heart-button"></button>
            <p class = "cards__like-counter"></p> 
          </div>
          </div>
          <button class="card__trash" type="button"></button>
        </div>
      </template>
    </div>

   
    
    
  </body>
</html>
